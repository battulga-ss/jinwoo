<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #0f0f0f;
        color: #fff;
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 600px;
        margin: 40px auto;
        background: #1a1a2e;
        border-radius: 16px;
        overflow: hidden;
      }
      .banner {
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        padding: 40px;
        text-align: center;
      }
      .banner h1 {
        margin: 0;
        font-size: 28px;
      }
      .content {
        padding: 32px;
      }
      .content p {
        color: #9ca3af;
        line-height: 1.6;
      }
      .badge {
        display: inline-block;
        background: rgba(37, 99, 235, 0.2);
        color: #60a5fa;
        border: 1px solid rgba(37, 99, 235, 0.3);
        padding: 4px 12px;
        border-radius: 99px;
        font-size: 13px;
      }
      .footer {
        text-align: center;
        padding: 20px;
        color: #4b5563;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="banner">
        <div style="font-size: 48px">⚡</div>
        <h1>Welcome, {{name}}!</h1>
      </div>
      <div class="content">
        <p>
          Your account has been successfully created. Start your journey and
          complete quests to level up!
        </p>
        <p><span class="badge">Level 1</span> — Your adventure begins now.</p>
      </div>
      <div class="footer">© 2026 Jinwoo App</div>
    </div>
  </body>
</html>
